<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Booster</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <img src="icon.png" alt="Logo" class="logo">
                <h1>Sound Booster</h1>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" title="Toggle Theme">
                    <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
                </button>
                <span id="version">1000% Max</span>
            </div>
        </header>
        
        <div class="status-card">
            <div class="percentage-display">
                <span id="volume-value">100</span>%
            </div>
            <div class="multiplier">
                <span id="multiplier-value">1.0</span>x Boost
            </div>
        </div>

        <div class="controls">
            <input type="range" id="volume-slider" min="0" max="1000" value="100" step="1">
            <div class="labels">
                <span>0%</span>
                <span>500%</span>
                <span>1000%</span>
            </div>
        </div>

        <div class="presets">
            <button class="preset-btn" data-value="100">Reset</button>
            <button class="preset-btn" data-value="300">3x</button>
            <button class="preset-btn" data-value="600">6x</button>
            <button class="preset-btn" data-value="1000">MAX</button>
        </div>

        <footer>
            <p>Control volume in real-time</p>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
